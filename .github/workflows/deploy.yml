name: Deploy to WordPress.org

# Releases the plugin to the WordPress.org SVN repository (slug: redaquest-connector).
# Runs ONLY when a semver tag is pushed (e.g. 2.8.4) or when triggered manually.
# A plain push to main does NOT deploy.
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   SVN_USERNAME, SVN_PASSWORD  — your WordPress.org account used for plugin commits.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: wp-org-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to WordPress.org
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPCS
        run: |
          vendor/bin/phpcs --config-set installed_paths vendor/wp-coding-standards/wpcs
          composer lint

      - name: PHPUnit
        if: ${{ hashFiles('tests/**/*.php') != '' }}
        run: composer test

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG_VERSION#v}"
          PLUGIN_VERSION=$(grep -m1 "Version:" redaquest-connector.php | awk '{print $3}')
          STABLE_TAG=$(grep -m1 "^Stable tag:" readme.txt | awk '{print $3}')
          echo "Git tag: $TAG_VERSION | Plugin header: $PLUGIN_VERSION | Readme stable tag: $STABLE_TAG"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ] || [ "$TAG_VERSION" != "$STABLE_TAG" ]; then
            echo "::error::Version mismatch. The git tag, the Version: header in redaquest-connector.php and the Stable tag: in readme.txt must all match."
            exit 1
          fi

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: redaquest-connector
          ASSETS_DIR: .wordpress-org
